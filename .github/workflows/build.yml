name: Build Plugin

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build wasm32-wasip1
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-wasip1

      - name: Build plugin
        run: cargo build --release --target wasm32-wasip1 -p super-tabs

      - name: Verify plugin exists
        run: |
          if [ -f "target/wasm32-wasip1/release/super-tabs.wasm" ]; then
            echo "Plugin found: target/wasm32-wasip1/release/super-tabs.wasm"
            ls -la "target/wasm32-wasip1/release/super-tabs.wasm"
          else
            echo "Plugin not found!"
            echo "Contents of release directory:"
            ls -la "target/wasm32-wasip1/release/" || echo "Release directory doesn't exist"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: super-tabs-wasm32-wasip1
          path: target/wasm32-wasip1/release/super-tabs.wasm
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f -name "*.wasm" | sort

      - name: Flatten artifacts
        run: |
          mkdir -p release-artifacts
          find artifacts -type f -name "*.wasm" -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          draft: true
          generate_release_notes: true
